name: Check Links

on:
  push:
    branches: [main]
  pull_request:

jobs:
  link-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check local links in docs
        uses: lycheeverse/lychee-action@v2
        with:
          args: --offline --include-fragments docs/**/*.md
          fail: true
